apiVersion: apps/v1
kind: Deployment
metadata:
  name: staccato-server
  namespace: staccato
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staccato-server
  template:
    metadata:
      labels:
        app: staccato-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: staccato-server
          image: staccato-server:dev
          imagePullPolicy: Never  # use locally loaded image in kind
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.monitoring.svc.cluster.local:4317"
            - name: LOG_LEVEL
              value: "debug"
            - name: OTEL_SERVICE_NAME
              value: "staccato-server"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
