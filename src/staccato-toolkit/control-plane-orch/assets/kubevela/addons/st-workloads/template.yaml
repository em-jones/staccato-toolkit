apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: st-workloads
  namespace: vela-system
  annotations:
    app.oam.dev/description: >-
      Bootstraps the GitOps infrastructure: applies the flux-operator, Harbor (OCI registry + credential init), and a FluxInstance so Flux controllers are running and the Harbor registry is available for OCI artifact storage.
spec:
  # Bootstrap ordering:
  #   Phase 0 (apply-object): flux-system Namespace — must precede Phase 1 to avoid
  #            pre-dispatch dry-run failures on namespaced objects.
  #   Phase 1 (k8s-objects):  flux-operator RBAC + Deployment.
  #            Prereq: CRDs in resources/ applied before addon install via:
  #              kubectl apply -f addons/st-workloads/resources/
  #   Phase 2 (k8s-objects):  FluxInstance — flux-operator reconciles to install Flux.
  #
  # After this addon runs, Flux controllers are operational. The environment Application
  # (ops.yaml / runtime.yaml) is applied next — Flux reconciles HelmRelease and ResourceSet
  # CRs defined there (harbor, capabilities, per-system ResourceSets, etc.).
  workflow:
    steps:
      - name: apply-flux-system-namespace
        type: apply-object
        properties:
          value:
            apiVersion: v1
            kind: Namespace
            metadata:
              name: flux-system
              labels:
                app.kubernetes.io/name: flux-operator
                app.kubernetes.io/managed-by: kubevela
                app.kubernetes.io/part-of: st-environment
      - name: apply-harbor-namespace
        type: apply-object
        properties:
          value:
            apiVersion: v1
            kind: Namespace
            metadata:
              name: harbor
              labels:
                app.kubernetes.io/name: harbor
                app.kubernetes.io/managed-by: kubevela
                app.kubernetes.io/part-of: st-environment
      - name: apply-bootstrap-manifests
        type: apply-component
        properties:
          component: bootstrap-manifests # NOTE: generated
      - name: apply-flux-instance
        type: apply-component
        properties:
          component: flux-instance
  components:
    - name: bootstrap-manifests
      type: k8s-objects
      properties:
        objects:
          - apiVersion: apiextensions.k8s.io/v1
            kind: CustomResourceDefinition
            metadata:
              annotations:
                controller-gen.kubebuilder.io/version: v0.20.0
                helm.sh/resource-policy: keep
              labels:
                app.kubernetes.io/instance: release-name
                app.kubernetes.io/managed-by: Helm
                app.kubernetes.io/name: flux-operator
                app.kubernetes.io/version: v0.43.0
                helm.sh/chart: flux-operator-0.43.0
              name: fluxinstances.fluxcd.controlplane.io
            spec:
              group: fluxcd.controlplane.io
              names:
                kind: FluxInstance
                listKind: FluxInstanceList
                plural: fluxinstances
                singular: fluxinstance
              scope: Namespaced
              versions:
                - additionalPrinterColumns:
                    - jsonPath: .metadata.creationTimestamp
                      name: Age
                      type: date
                    - jsonPath: .status.conditions[?(@.type=="Ready")].status
                      name: Ready
                      type: string
                    - jsonPath: .status.conditions[?(@.type=="Ready")].message
                      name: Status
                      type: string
                    - jsonPath: .status.lastAttemptedRevision
                      name: Revision
                      type: string
                  name: v1
                  schema:
                    openAPIV3Schema:
                      description: FluxInstance is the Schema for the fluxinstances API
                      properties:
                        apiVersion:
                          description: |-
                            APIVersion defines the versioned schema of this representation of an object.
                            Servers should convert recognized schemas to the latest internal value, and
                            may reject unrecognized values.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                          type: string
                        kind:
                          description: |-
                            Kind is a string value representing the REST resource this object represents.
                            Servers may infer this from the endpoint the client submits requests to.
                            Cannot be updated.
                            In CamelCase.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        metadata:
                          type: object
                        spec:
                          description: FluxInstanceSpec defines the desired state of FluxInstance
                          properties:
                            cluster:
                              description: Cluster holds the specification of the Kubernetes cluster.
                              properties:
                                domain:
                                  default: cluster.local
                                  description: |-
                                    Domain is the cluster domain used for generating the FQDN of services.
                                    Defaults to 'cluster.local'.
                                  type: string
                                multitenant:
                                  default: false
                                  description: Multitenant enables the multitenancy lockdown. Defaults to false.
                                  type: boolean
                                multitenantWorkloadIdentity:
                                  default: false
                                  description: |-
                                    MultitenantWorkloadIdentity enables the multitenancy lockdown for
                                    workload identity. Defaults to false.
                                  type: boolean
                                networkPolicy:
                                  default: true
                                  description: |-
                                    NetworkPolicy restricts network access to the current namespace.
                                    Defaults to true.
                                  type: boolean
                                objectLevelWorkloadIdentity:
                                  description: |-
                                    ObjectLevelWorkloadIdentity enables the feature gate
                                    required for object-level workload identity.
                                    This feature is only available in Flux v2.6.0 and later.
                                  type: boolean
                                size:
                                  description: |-
                                    Size defines the vertical scaling profile of the Flux controllers.
                                    The size is used to determine the concurrency and CPU/Memory limits for the Flux controllers.
                                    Accepted values are: 'small', 'medium' and 'large'.
                                  enum:
                                    - small
                                    - medium
                                    - large
                                  type: string
                                tenantDefaultDecryptionServiceAccount:
                                  description: |-
                                    TenantDefaultDecryptionServiceAccount is the name of the service account
                                    to use as default for kustomize-controller SOPS decryption when the
                                    multitenant lockdown for workload identity is enabled. Defaults to the
                                    'default' service account from the tenant namespace.
                                  type: string
                                tenantDefaultKubeConfigServiceAccount:
                                  description: |-
                                    TenantDefaultKubeConfigServiceAccount is the name of the service account
                                    to use as default for kustomize-controller and helm-controller remote
                                    cluster access via spec.kubeConfig.configMapRef when the multitenant
                                    lockdown for workload identity is enabled. Defaults to the 'default'
                                    service account from the tenant namespace.
                                  type: string
                                tenantDefaultServiceAccount:
                                  description: |-
                                    TenantDefaultServiceAccount is the name of the service account
                                    to use as default when the multitenant lockdown is enabled, for
                                    kustomize-controller and helm-controller.
                                    This field will also be used for multitenant workload identity
                                    lockdown for source-controller, notification-controller,
                                    image-reflector-controller and image-automation-controller.
                                    Defaults to the 'default' service account from the tenant namespace.
                                  type: string
                                type:
                                  default: kubernetes
                                  description: |-
                                    Type specifies the distro of the Kubernetes cluster.
                                    Defaults to 'kubernetes'.
                                  enum:
                                    - kubernetes
                                    - openshift
                                    - aws
                                    - azure
                                    - gcp
                                  type: string
                              type: object
                              x-kubernetes-validations:
                                - message: .objectLevelWorkloadIdentity must be set to true when .multitenantWorkloadIdentity is set to true
                                  rule: (has(self.objectLevelWorkloadIdentity) && self.objectLevelWorkloadIdentity) || !has(self.multitenantWorkloadIdentity) || !self.multitenantWorkloadIdentity
                            commonMetadata:
                              description: |-
                                CommonMetadata specifies the common labels and annotations that are
                                applied to all resources. Any existing label or annotation will be
                                overridden if its key matches a common one.
                              properties:
                                annotations:
                                  additionalProperties:
                                    type: string
                                  description: Annotations to be added to the object's metadata.
                                  type: object
                                labels:
                                  additionalProperties:
                                    type: string
                                  description: Labels to be added to the object's metadata.
                                  type: object
                              type: object
                            components:
                              description: |-
                                Components is the list of controllers to install.
                                Defaults to the core Flux controllers:
                                  - source-controller
                                  - kustomize-controller
                                  - helm-controller
                                  - notification-controller
                              items:
                                description: Component is the name of a controller to install.
                                enum:
                                  - source-controller
                                  - kustomize-controller
                                  - helm-controller
                                  - notification-controller
                                  - image-reflector-controller
                                  - image-automation-controller
                                  - source-watcher
                                type: string
                              type: array
                            distribution:
                              description: Distribution specifies the version and container registry to pull images from.
                              properties:
                                artifact:
                                  description: |-
                                    Artifact is the URL to the OCI artifact containing
                                    the latest Kubernetes manifests for the distribution,
                                    e.g. 'oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:latest'.
                                  pattern: ^oci://.*$
                                  type: string
                                artifactPullSecret:
                                  description: |-
                                    ArtifactPullSecret is the name of the Kubernetes secret
                                    to use for pulling the Kubernetes manifests for the distribution specified in the Artifact field.
                                  type: string
                                imagePullSecret:
                                  description: |-
                                    ImagePullSecret is the name of the Kubernetes secret
                                    to use for pulling images.
                                  type: string
                                registry:
                                  description: |-
                                    Registry address to pull the distribution images from
                                    e.g. 'ghcr.io/fluxcd'.
                                  type: string
                                variant:
                                  description: |-
                                    Variant specifies the Flux distribution flavor stored
                                    in the registry.
                                  enum:
                                    - upstream-alpine
                                    - enterprise-alpine
                                    - enterprise-distroless
                                    - enterprise-distroless-fips
                                  type: string
                                version:
                                  description: Version semver expression e.g. '2.x', '2.3.x'.
                                  type: string
                              required:
                                - registry
                                - version
                              type: object
                            kustomize:
                              description: |-
                                Kustomize holds a set of patches that can be applied to the
                                Flux installation, to customize the way Flux operates.
                              properties:
                                patches:
                                  description: |-
                                    Strategic merge and JSON patches, defined as inline YAML objects,
                                    capable of targeting objects based on kind, label and annotation selectors.
                                  items:
                                    description: |-
                                      Patch contains an inline StrategicMerge or JSON6902 patch, and the target the patch should
                                      be applied to.
                                    properties:
                                      patch:
                                        description: |-
                                          Patch contains an inline StrategicMerge patch or an inline JSON6902 patch with
                                          an array of operation objects.
                                        type: string
                                      target:
                                        description: Target points to the resources that the patch document should be applied to.
                                        properties:
                                          annotationSelector:
                                            description: |-
                                              AnnotationSelector is a string that follows the label selection expression
                                              https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#api
                                              It matches with the resource annotations.
                                            type: string
                                          group:
                                            description: |-
                                              Group is the API group to select resources from.
                                              Together with Version and Kind it is capable of unambiguously identifying and/or selecting resources.
                                              https://github.com/kubernetes/community/blob/master/contributors/design-proposals/api-machinery/api-group.md
                                            type: string
                                          kind:
                                            description: |-
                                              Kind of the API Group to select resources from.
                                              Together with Group and Version it is capable of unambiguously
                                              identifying and/or selecting resources.
                                              https://github.com/kubernetes/community/blob/master/contributors/design-proposals/api-machinery/api-group.md
                                            type: string
                                          labelSelector:
                                            description: |-
                                              LabelSelector is a string that follows the label selection expression
                                              https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/#api
                                              It matches with the resource labels.
                                            type: string
                                          name:
                                            description: Name to match resources with.
                                            type: string
                                          namespace:
                                            description: Namespace to select resources from.
                                            type: string
                                          version:
                                            description: |-
                                              Version of the API Group to select resources from.
                                              Together with Group and Kind it is capable of unambiguously identifying and/or selecting resources.
                                              https://github.com/kubernetes/community/blob/master/contributors/design-proposals/api-machinery/api-group.md
                                            type: string
                                        type: object
                                    required:
                                      - patch
                                    type: object
                                  type: array
                              type: object
                            migrateResources:
                              default: true
                              description: |-
                                MigrateResources instructs the controller to migrate the Flux custom resources
                                from the previous version to the latest API version specified in the CRD.
                                Defaults to true.
                              type: boolean
                            sharding:
                              description: Sharding holds the specification of the sharding configuration.
                              properties:
                                key:
                                  default: sharding.fluxcd.io/key
                                  description: Key is the label key used to shard the resources.
                                  type: string
                                shards:
                                  description: Shards is the list of shard names.
                                  items:
                                    type: string
                                  minItems: 1
                                  type: array
                                storage:
                                  description: |-
                                    Storage defines if the source-controller shards
                                    should use an emptyDir or a persistent volume claim for storage.
                                    Accepted values are 'ephemeral' or 'persistent', defaults to 'ephemeral'.
                                    For 'persistent' to take effect, the '.spec.storage' field must be set.
                                  enum:
                                    - ephemeral
                                    - persistent
                                  type: string
                              required:
                                - shards
                              type: object
                            storage:
                              description: |-
                                Storage holds the specification of the source-controller
                                persistent volume claim.
                              properties:
                                class:
                                  description: Class is the storage class to use for the PVC.
                                  type: string
                                size:
                                  description: Size is the size of the PVC.
                                  type: string
                              required:
                                - class
                                - size
                              type: object
                            sync:
                              description: |-
                                Sync specifies the source for the cluster sync operation.
                                When set, a Flux source (GitRepository, OCIRepository or Bucket)
                                and Flux Kustomization are created to sync the cluster state
                                with the source repository.
                              properties:
                                interval:
                                  default: 1m
                                  description: Interval is the time between syncs.
                                  pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                                  type: string
                                kind:
                                  description: Kind is the kind of the source.
                                  enum:
                                    - OCIRepository
                                    - GitRepository
                                    - Bucket
                                  type: string
                                name:
                                  description: |-
                                    Name is the name of the Flux source and kustomization resources.
                                    When not specified, the name is set to the namespace name of the FluxInstance.
                                  maxLength: 63
                                  type: string
                                  x-kubernetes-validations:
                                    - message: Sync name is immutable
                                      rule: self == oldSelf
                                path:
                                  description: |-
                                    Path is the path to the source directory containing
                                    the kustomize overlay or plain Kubernetes manifests.
                                  type: string
                                provider:
                                  description: |-
                                    Provider specifies OIDC provider for source authentication.
                                    For OCIRepository and Bucket the provider can be set to 'aws', 'azure' or 'gcp'.
                                    for GitRepository the accepted value can be set to 'azure' or 'github'.
                                    To disable OIDC authentication the provider can be set to 'generic' or left empty.
                                  enum:
                                    - generic
                                    - aws
                                    - azure
                                    - gcp
                                    - github
                                  type: string
                                pullSecret:
                                  description: |-
                                    PullSecret specifies the Kubernetes Secret containing the
                                    authentication credentials for the source.
                                    For Git over HTTP/S sources, the secret must contain username and password fields.
                                    For Git over SSH sources, the secret must contain known_hosts and identity fields.
                                    For OCI sources, the secret must be of type kubernetes.io/dockerconfigjson.
                                    For Bucket sources, the secret must contain accesskey and secretkey fields.
                                  type: string
                                ref:
                                  description: |-
                                    Ref is the source reference, can be a Git ref name e.g. 'refs/heads/main',
                                    an OCI tag e.g. 'latest' or a bucket name e.g. 'flux'.
                                  type: string
                                url:
                                  description: |-
                                    URL is the source URL, can be a Git repository HTTP/S or SSH address,
                                    an OCI repository address or a Bucket endpoint.
                                  type: string
                              required:
                                - kind
                                - path
                                - ref
                                - url
                              type: object
                            wait:
                              default: true
                              description: |-
                                Wait instructs the controller to check the health of all the reconciled
                                resources. Defaults to true.
                              type: boolean
                          required:
                            - distribution
                          type: object
                        status:
                          description: FluxInstanceStatus defines the observed state of FluxInstance
                          properties:
                            components:
                              description: Components contains the container images used by the components.
                              items:
                                description: ComponentImage represents a container image used by a component.
                                properties:
                                  digest:
                                    description: Digest of the container image.
                                    type: string
                                  name:
                                    description: Name of the component.
                                    type: string
                                  repository:
                                    description: Repository address of the container image.
                                    type: string
                                  tag:
                                    description: Tag of the container image.
                                    type: string
                                required:
                                  - name
                                  - repository
                                  - tag
                                type: object
                              type: array
                            conditions:
                              description: Conditions contains the readiness conditions of the object.
                              items:
                                description: Condition contains details for one aspect of the current state of this API Resource.
                                properties:
                                  lastTransitionTime:
                                    description: |-
                                      lastTransitionTime is the last time the condition transitioned from one status to another.
                                      This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                                    format: date-time
                                    type: string
                                  message:
                                    description: |-
                                      message is a human readable message indicating details about the transition.
                                      This may be an empty string.
                                    maxLength: 32768
                                    type: string
                                  observedGeneration:
                                    description: |-
                                      observedGeneration represents the .metadata.generation that the condition was set based upon.
                                      For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                                      with respect to the current state of the instance.
                                    format: int64
                                    minimum: 0
                                    type: integer
                                  reason:
                                    description: |-
                                      reason contains a programmatic identifier indicating the reason for the condition's last transition.
                                      Producers of specific condition types may define expected values and meanings for this field,
                                      and whether the values are considered a guaranteed API.
                                      The value should be a CamelCase string.
                                      This field may not be empty.
                                    maxLength: 1024
                                    minLength: 1
                                    pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                                    type: string
                                  status:
                                    description: status of the condition, one of True, False, Unknown.
                                    enum:
                                      - "True"
                                      - "False"
                                      - Unknown
                                    type: string
                                  type:
                                    description: type of condition in CamelCase or in foo.example.com/CamelCase.
                                    maxLength: 316
                                    pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                                    type: string
                                required:
                                  - lastTransitionTime
                                  - message
                                  - reason
                                  - status
                                  - type
                                type: object
                              type: array
                            history:
                              description: |-
                                History contains the reconciliation history of the FluxInstance
                                as a list of snapshots ordered by the last reconciled time.
                              items:
                                description: |-
                                  Snapshot represents a point-in-time record of a group of resources reconciliation,
                                  including timing information, status, and a unique digest identifier.
                                properties:
                                  digest:
                                    description: Digest is the checksum in the format `<algo>:<hex>` of the resources in this snapshot.
                                    type: string
                                  firstReconciled:
                                    description: FirstReconciled is the time when this revision was first reconciled to the cluster.
                                    format: date-time
                                    type: string
                                  lastReconciled:
                                    description: LastReconciled is the time when this revision was last reconciled to the cluster.
                                    format: date-time
                                    type: string
                                  lastReconciledDuration:
                                    description: LastReconciledDuration is time it took to reconcile the resources in this revision.
                                    type: string
                                  lastReconciledStatus:
                                    description: LastReconciledStatus is the status of the last reconciliation.
                                    type: string
                                  metadata:
                                    additionalProperties:
                                      type: string
                                    description: Metadata contains additional information about the snapshot.
                                    type: object
                                  totalReconciliations:
                                    description: TotalReconciliations is the total number of reconciliations that have occurred for this snapshot.
                                    format: int64
                                    type: integer
                                required:
                                  - digest
                                  - firstReconciled
                                  - lastReconciled
                                  - lastReconciledDuration
                                  - lastReconciledStatus
                                  - totalReconciliations
                                type: object
                              type: array
                            inventory:
                              description: |-
                                Inventory contains a list of Kubernetes resource object references
                                last applied on the cluster.
                              properties:
                                entries:
                                  description: Entries of Kubernetes resource object references.
                                  items:
                                    description: ResourceRef contains the information necessary to locate a resource within a cluster.
                                    properties:
                                      id:
                                        description: |-
                                          ID is the string representation of the Kubernetes resource object's metadata,
                                          in the format '<namespace>_<name>_<group>_<kind>'.
                                        type: string
                                      v:
                                        description: Version is the API version of the Kubernetes resource object's kind.
                                        type: string
                                    required:
                                      - id
                                      - v
                                    type: object
                                  type: array
                              required:
                                - entries
                              type: object
                            lastAppliedRevision:
                              description: |-
                                LastAppliedRevision is the version and digest of the
                                distribution config that was last reconcile.
                              type: string
                            lastArtifactRevision:
                              description: |-
                                LastArtifactRevision is the digest of the last pulled
                                distribution artifact.
                              type: string
                            lastAttemptedRevision:
                              description: |-
                                LastAttemptedRevision is the version and digest of the
                                distribution config that was last attempted to reconcile.
                              type: string
                            lastHandledForceAt:
                              description: |-
                                LastHandledForceAt holds the value of the most recent
                                force request value, so a change of the annotation value
                                can be detected.
                              type: string
                            lastHandledReconcileAt:
                              description: |-
                                LastHandledReconcileAt holds the value of the most recent
                                reconcile request value, so a change of the annotation value
                                can be detected.
                              type: string
                          type: object
                      type: object
                      x-kubernetes-validations:
                        - message: the only accepted name for a FluxInstance is 'flux'
                          rule: self.metadata.name == 'flux'
                  served: true
                  storage: true
                  subresources:
                    status: {}
          - apiVersion: apiextensions.k8s.io/v1
            kind: CustomResourceDefinition
            metadata:
              annotations:
                controller-gen.kubebuilder.io/version: v0.20.0
                helm.sh/resource-policy: keep
              labels:
                app.kubernetes.io/instance: release-name
                app.kubernetes.io/managed-by: Helm
                app.kubernetes.io/name: flux-operator
                app.kubernetes.io/version: v0.43.0
                helm.sh/chart: flux-operator-0.43.0
              name: fluxreports.fluxcd.controlplane.io
            spec:
              group: fluxcd.controlplane.io
              names:
                kind: FluxReport
                listKind: FluxReportList
                plural: fluxreports
                singular: fluxreport
              scope: Namespaced
              versions:
                - additionalPrinterColumns:
                    - jsonPath: .spec.distribution.entitlement
                      name: Entitlement
                      priority: 10
                      type: string
                    - jsonPath: .metadata.creationTimestamp
                      name: Age
                      type: date
                    - jsonPath: .status.conditions[?(@.type=="Ready")].status
                      name: Ready
                      type: string
                    - jsonPath: .status.conditions[?(@.type=="Ready")].message
                      name: Status
                      type: string
                    - jsonPath: .status.conditions[?(@.type=="Ready")].lastTransitionTime
                      name: LastUpdated
                      type: string
                  name: v1
                  schema:
                    openAPIV3Schema:
                      description: FluxReport is the Schema for the fluxreports API.
                      properties:
                        apiVersion:
                          description: |-
                            APIVersion defines the versioned schema of this representation of an object.
                            Servers should convert recognized schemas to the latest internal value, and
                            may reject unrecognized values.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                          type: string
                        kind:
                          description: |-
                            Kind is a string value representing the REST resource this object represents.
                            Servers may infer this from the endpoint the client submits requests to.
                            Cannot be updated.
                            In CamelCase.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        metadata:
                          type: object
                        spec:
                          description: FluxReportSpec defines the observed state of a Flux installation.
                          properties:
                            cluster:
                              description: Cluster is the version information of the Kubernetes cluster.
                              properties:
                                nodes:
                                  description: Nodes is the number of nodes in the Kubernetes cluster.
                                  type: integer
                                platform:
                                  description: Platform is the os/arch of the Kubernetes control plane.
                                  type: string
                                serverVersion:
                                  description: ServerVersion is the version of the Kubernetes API server.
                                  type: string
                              required:
                                - platform
                                - serverVersion
                              type: object
                            components:
                              description: ComponentsStatus is the status of the Flux controller deployments.
                              items:
                                description: FluxComponentStatus defines the observed state of a Flux component.
                                properties:
                                  image:
                                    description: Image is the container image of the Flux component.
                                    type: string
