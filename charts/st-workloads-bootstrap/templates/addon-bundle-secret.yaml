{{- if .Values.addon.enabled }}
# Packages the st-workloads addon directory as a base64-encoded tarball inside
# a Secret so the installer Job can mount and extract it without hitting
# ConfigMap's 1 MiB key-size limit.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.addon.bundleSecretName }}
  namespace: vela-system
  labels:
    {{- include "st-workloads-bootstrap.labels" . | nindent 4 }}
  annotations:
    # Ensure the Secret is updated whenever the chart is upgraded so the Job
    # always uses the latest addon bundle.
    helm.sh/resource-policy: keep
type: Opaque
data:
  # The tarball is stored in charts/st-workloads-bootstrap/files/st-workloads.tgz
  # and regenerated by hack/sync-st-workloads-chart.sh before each release.
  st-workloads.tgz: {{ .Files.Get "files/st-workloads.tgz" | b64enc }}
{{- end }}
