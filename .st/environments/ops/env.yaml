apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: ops-environment
  namespace: vela-system
  annotations:
    app.oam.dev/description: >
      Ops environment for the staccato control plane cluster. Installs Flux, Harbor,
      observability (hosted-lgtm), SSO (casdoor), headlamp, and penpot.
spec:
  components:
    - name: ops
      type: ops-environment
      properties:
        name: ops
        description: "Staccato control plane environment — GitOps, observability, auth, and dev tooling."
        systems: []
        providers:
          auth-provider:
            enabled: true
            type: auth-casdoor
            name: ops
            namespace: casdoor
          observability-lgtm:
            enabled: true
            type: hosted-lgtm
            name: ops
            namespace: monitoring
        environment:
          otel-collector-operator:
            enabled: true
          headlamp:
            enabled: true
            repo: "https://kubernetes-sigs.github.io/headlamp/"
            version: "0.40.1"
            namespace: headlamp
            releaseName: headlamp
            includeCRDs: false
          penpot:
            enabled: true
          dev-portal:
            enabled: true
          trivy:
            enabled: true
          external-secrets:
            enabled: false
          reloader:
            enabled: true
          keda:
            enabled: false
          wasmcloud:
            enabled: false
          external-dns:
            enabled: false
            instances: []
          gitopsConfig:
            type: flux
            url: "oci://harbor-core.harbor.svc.cluster.local/staccato/manifests"
            ref: "latest"
            pullSecret: "harbor-oci-credentials"
